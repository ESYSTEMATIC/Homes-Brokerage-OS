<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Homes Brokerage OS</title>
  <script>
    // GitHub Pages SPA redirect: converts /path to /#/path
    var pathSegmentsToKeep = 1; // Keep /Homes-Brokerage-OS/
    var l = window.location;
    var path = l.pathname.split('/').slice(pathSegmentsToKeep + 1).join('/');
    if (path) {
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/') + '/#/' + path +
        (l.search || '') + (l.hash || ''));
    } else {
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/') + '/');
    }
  </script>
</head>
<body></body>
</html>
